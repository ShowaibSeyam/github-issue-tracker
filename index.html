<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
</head>

<!-- tailwind with daisy -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome cdn -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- google fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">


<style>
    * {
        font-family: "Open Sans", sans-serif;

    }
</style>


<body class="min-h-screen bg-[#eef2f7] flex items-center justify-center py-10">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl px-10 py-10 mx-4">

        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 object-contain">
        </div>

        <h1 class="text-center text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
        <p class="text-center text-sm text-gray-500 mb-8">Sign in to manage your issues</p>

        <!-- Username-->
        <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-800 mb-1">Username</label>
            <input type="text" placeholder="Enter Username"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
            <p class="text-xs text-primary font-semibold mt-1">Default: admin</p>
        </div>

        <!-- Password -->
        <div class="mb-7">
            <label class="block text-sm font-semibold text-gray-800 mb-1">Password</label>
            <input type="password" placeholder="Enter Password"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
            <p class="text-xs text-primary font-semibold mt-1">Default: admin123</p>
        </div>

        <button
            class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold py-3 rounded-lg text-sm transition-all duration-200 shadow-md hover:shadow-lg cursor-pointer">
            Sign In
        </button>

        <div class="flex items-center my-6 gap-3">
            <div class="flex-1 h-[1px] bg-gray-200"></div>
            <span class="text-xs text-gray-400 font-medium">OR</span>
            <div class="flex-1 h-[1px] bg-gray-200"></div>
        </div>

        <div class="text-center">
            <p class="text-xs text-gray-400 mb-2">Demo Credentials:</p>
            <div class="bg-base-200 p-5 rounded-md">
                <p class="text-sm text-gray-700"><span class="font-bold">Username:</span> admin</p>
                <p class="text-sm text-gray-700"><span class="font-bold">Password:</span> admin123</p>
            </div>

        </div>

    </div>

    <script src="./script/script.js"></script>
</body>

</html>
